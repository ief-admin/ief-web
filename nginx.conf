server {
    listen 80;
    listen [::]:80;
    server_name ief-dev;

    # The root directory for  website files on SSD
    root /usr/share/nginx/html;
    index index.html index.htm;

    # SSI configuration: This enables the "stitching" of  modular HTML parts
    ssi on;
    ssi_silent_errors on; # Prevents showing [an error occurred while processing this directive] to users

    location / {
        try_files $uri $uri/ =404;
    }

    # Handle the media assets folder on HDD 
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        autoindex on; 
    }

    # Standard error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
