name: Build & Deploy — IEF Website

on:
  push:
    branches:
      - main        # → Cloudflare Production (ief-global.org)
      - develop     # → Cloudflare Preview   (develop.ief-site.pages.dev)
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python for compile_site.py ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Build — compile SSI includes into dist/ ────────────────────────
      # Note: media assets live on your local HDD (/mnt/data/web/ief-media)
      # and are NOT in the git repo. The build step below handles this by
      # creating an empty assets/ dir so the deploy doesn't fail.
      # You must separately ensure assets are available — see note below.
      - name: Build static site
        run: python3 html/compile_site.py
        # NOTE: /mnt/data/web/ief-media is not available in CI.
        # compile_site.py skips assets gracefully when source dir is missing.
        # Assets already deployed to Cloudflare CDN are preserved between deploys.
        # To update assets, run ./deploy.sh locally on minnaham (has /mnt/data access).
        env:
          # compile_site.py copies from /mnt/data/web/ief-media which doesn't
          # exist in CI — the script prints a warning but continues.
          # Assets are handled in the next step.
          CI: true

      # ── 4. Deploy to Cloudflare Pages ────────────────────────────────────
      # Branch mapping (configured in Cloudflare Pages project settings):
      #   main    → Production  (ief-global.org)
      #   develop → Preview     (develop.ief-site.pages.dev)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ief-site