name: Build & Deploy — IEF Website

on:
  push:
    branches:
      - main        # → Cloudflare Production (ief-global.org)
      - develop     # → Cloudflare Preview   (develop.ief-site.pages.dev)
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python for compile_site.py ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Build — compile SSI includes into dist/ ────────────────────────
      # Media lives in the repo at html/assets/ (committed to git), so
      # compile_site.py copies it into dist/assets and CI deploys the full
      # site (HTML + media) to both preview and production.
      - name: Build static site
        run: python3 html/compile_site.py
        env:
          CI: true

      # ── 4. Deploy to Cloudflare Pages ────────────────────────────────────
      # Branch mapping (configured in Cloudflare Pages project settings):
      #   main    → Production  (ief-global.org)
      #   develop → Preview     (develop.ief-site.pages.dev)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ief-site --branch=${{ github.ref_name }} --commit-dirty=true