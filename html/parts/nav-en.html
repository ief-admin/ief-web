<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
        <a href="/en" class="flex items-center gap-2 group">
            <img src="/assets/logo.webp" alt="IEF Logo" class="h-10 w-auto">
            <span class="text-xl font-black tracking-tighter text-blue-900">Education in their own voice.</span>
        </a>
        <div class="hidden md:flex items-center gap-8" x-data="{
            activeSection: '#home',
            init() {
                if (window.location.pathname.includes('gallery')) {
                    this.activeSection = '#gallery';
                    return;
                }
                const map = { branding: '#home', stats: '#home', mission: '#mission', gallery: '#gallery', contact: '#contact' };
                const targets = Object.keys(map)
                    .map(id => document.getElementById(id))
                    .filter(Boolean);
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) this.activeSection = map[e.target.id];
                    });
                }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
                targets.forEach(t => observer.observe(t));
            }
        }">
            <a href="/en/index.html"
               :class="activeSection === '#home' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-600'"
               class="text-sm font-bold hover:text-blue-600 border-b-2 pb-1 transition-colors duration-200">Home</a>

            <a href="/en/index.html#mission"
               :class="activeSection === '#mission' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-600'"
               class="text-sm font-bold hover:text-blue-600 border-b-2 pb-1 transition-colors duration-200">Our Mission</a>

            <a href="/en/gallery.html"
               :class="activeSection === '#gallery' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-600'"
               class="text-sm font-bold hover:text-blue-600 border-b-2 pb-1 transition-colors duration-200">Gallery</a>

            <a href="/en/index.html#contact"
               :class="activeSection === '#contact' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-600'"
               class="text-sm font-bold hover:text-blue-600 border-b-2 pb-1 transition-colors duration-200">Contact Us</a>
        </div>
        <div class="flex items-center gap-6">
            <button @click="showDonate = true" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:shadow-lg transition">Donate</button>
            <a href="/ta" class="text-sm font-bold text-blue-600">தமிழ்</a>
        </div>
    </div>
</nav>
