<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEF | சமூகப் படத் தொகுப்பு</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        body { font-family: 'IBM Plex Sans Tamil', sans-serif !important; }

        /* Lightbox transition */
        [x-show="lightbox"] { transition: opacity 0.2s ease; }

        /* Gallery grid hover */
        .photo-card img { transition: transform 0.4s ease; }
        .photo-card:hover img { transform: scale(1.05); }

        /* Video card */
        .video-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .video-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
    </style>
</head>

<body class="bg-slate-950 text-white font-sans" x-data="{
    showDonate: false,
    lang: 'ta',

    lightbox: false,
    lightboxImg: '',
    lightboxTitle: '',

    activeVideo: { url: 'QwRz5runoVY', title: 'தமிழ்நாடு சட்டப்பேரவையில்' },

    photoItems: [
        { url: '/assets/picture-00.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-01.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-02.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-03.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-04.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-05.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-06.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-07.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-08.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-09.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-10.webp', title: 'மாணவர் கற்றல்' },
        { url: '/assets/picture-11.webp', title: 'மாணவர் கற்றல்' }
    ],
    videoItems: [
        { url: 'QwRz5runoVY',  title: 'தமிழ்நாடு சட்டப்பேரவையில்' },
        { url: 'pU6eEHzCSjE',  title: 'தாய்த்தமிழ் பள்ளி, குன்றத்தூர்' },
        { url: 'QpQJJkkYC5Y',  title: 'தாய்த்தமிழ் பள்ளி, திருப்பூர்' },
        { url: 'SE1JnmZYP-w',  title: 'தாய்த்தமிழ் பள்ளி, கோபி' },
        { url: 'p641bcXTFN0',  title: 'தாய்த்தமிழ் பள்ளி மாணவர்கள் கலைநிகழ்ச்சி' }
    ],

    openLightbox(item) {
        this.lightboxImg = item.url;
        this.lightboxTitle = item.title;
        this.lightbox = true;
        document.body.style.overflow = 'hidden';
    },
    closeLightbox() {
        this.lightbox = false;
        document.body.style.overflow = '';
    }
}">

<!--#include virtual="/parts/nav-ta.html" -->

<!-- Page Header -->
<section class="hero-gradient py-14 px-6 text-center">
    <div class="max-w-3xl mx-auto">
        <p class="text-blue-200 text-sm font-semibold uppercase tracking-widest mb-3">IEF சமூகம்</p>
        <h1 class="text-3xl md:text-5xl font-black text-white mb-4">சமூகப் படத் தொகுப்பு</h1>
        <p class="text-slate-200 text-base md:text-lg leading-relaxed">
            தமிழ்நாடு மற்றும் உலகெங்கும் உள்ள எங்கள் பள்ளிகள், மாணவர்கள் மற்றும் சமூக நிகழ்வுகளின் புகைப்படங்கள் மற்றும் காணொளிகள்.
        </p>
    </div>
</section>

<!-- ── PHOTOS SECTION ── -->
<section id="photos" class="py-16 px-6">
    <div class="max-w-6xl mx-auto">

        <div class="flex items-center gap-3 mb-8">
            <svg class="w-6 h-6 text-blue-400 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <h2 class="text-2xl font-bold text-white">புகைப்படங்கள்</h2>
            <span class="text-sm text-slate-500 font-medium">(<span x-text="photoItems.length"></span> படங்கள்)</span>
        </div>

        <!-- Responsive photo grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
            <template x-for="(item, idx) in photoItems" :key="item.url">
                <div class="photo-card rounded-xl overflow-hidden cursor-pointer bg-slate-900 border border-white/5 hover:border-blue-500/50 transition-all duration-300"
                     :class="idx === 0 ? 'col-span-2 row-span-2' : ''"
                     @click="openLightbox(item)">
                    <div class="relative w-full h-full" :class="idx === 0 ? 'aspect-square' : 'aspect-video'">
                        <img :src="item.url" :alt="item.title"
                             class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute inset-0 bg-blue-900/0 hover:bg-blue-900/30 transition-colors duration-300 flex items-end p-3 opacity-0 hover:opacity-100">
                            <span class="text-xs text-white font-semibold bg-black/50 px-2 py-1 rounded-full" x-text="item.title"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

    </div>
</section>

<!-- ── VIDEOS SECTION ── -->
<section id="videos" class="py-16 px-6 bg-slate-900/50">
    <div class="max-w-6xl mx-auto">

        <div class="flex items-center gap-3 mb-8">
            <svg class="w-6 h-6 text-blue-400 flex-none" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/>
            </svg>
            <h2 class="text-2xl font-bold text-white">காணொளிகள்</h2>
            <span class="text-sm text-slate-500 font-medium">(<span x-text="videoItems.length"></span> காணொளிகள்)</span>
        </div>

        <!-- Featured video player -->
        <div class="mb-8 rounded-2xl overflow-hidden shadow-2xl border border-white/10 aspect-video max-w-3xl mx-auto">
            <iframe class="w-full h-full"
                :src="'https://www.youtube-nocookie.com/embed/' + activeVideo.url + '?rel=0&modestbranding=1'"
                :title="activeVideo.title"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
        </div>
        <p class="text-center text-slate-300 font-semibold mb-10 text-lg" x-text="activeVideo.title"></p>

        <!-- Video thumbnail grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 md:gap-4">
            <template x-for="item in videoItems" :key="item.url">
                <button type="button"
                        @click="activeVideo = item"
                        class="video-card rounded-xl overflow-hidden border-2 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 relative"
                        :class="activeVideo.url === item.url ? 'border-blue-500' : 'border-white/10 hover:border-blue-500/50'">
                    <div class="aspect-video relative">
                        <img :src="'https://img.youtube.com/vi/' + item.url + '/mqdefault.jpg'"
                             class="w-full h-full object-cover" :alt="item.title" loading="lazy">
                        <div class="absolute inset-0 flex items-center justify-center"
                             :class="activeVideo.url === item.url ? 'bg-blue-600/30' : 'bg-black/30'">
                            <svg class="w-8 h-8 text-white drop-shadow" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="p-2 bg-slate-900">
                        <p class="text-xs text-slate-300 font-medium leading-snug line-clamp-2 text-left" x-text="item.title"></p>
                    </div>
                </button>
            </template>
        </div>

    </div>
</section>

<!-- ── LIGHTBOX ── -->
<div x-show="lightbox"
     x-cloak
     class="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4"
     @keydown.escape.window="closeLightbox()"
     @click.self="closeLightbox()">
    <div class="relative max-w-4xl w-full">
        <button @click="closeLightbox()"
                class="absolute -top-10 right-0 text-white/70 hover:text-white transition text-sm font-bold flex items-center gap-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
            மூடு
        </button>
        <img :src="lightboxImg" :alt="lightboxTitle"
             class="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl">
        <p class="text-center text-slate-300 text-sm font-medium mt-3" x-text="lightboxTitle"></p>
    </div>
</div>

<!-- Back to Home -->
<section class="py-10 px-6 text-center bg-slate-950">
    <a href="/ta/index.html" class="inline-flex items-center gap-2 text-sm font-bold text-blue-400 hover:text-blue-300 transition border border-blue-400/40 hover:border-blue-300/60 px-5 py-2.5 rounded-full">
        <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
        முகப்புக்குத் திரும்பு
    </a>
</section>

<!--#include virtual="/parts/donate-modal.html" -->
<!--#include virtual="/parts/footer.html" -->

</body>
</html>
