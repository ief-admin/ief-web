<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEF | சமூகப் படத் தொகுப்பு</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <style>
        [x-cloak] { display: none !important; }
        .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        body { font-family: 'Noto Sans', 'Noto Sans Tamil', sans-serif !important; }

        /* Gallery reel scrollbar */
        .gallery-reel::-webkit-scrollbar { width: 4px; height: 4px; }
        .gallery-reel::-webkit-scrollbar-track { background: rgba(255,255,255,0.08); border-radius: 999px; }
        .gallery-reel::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.55); border-radius: 999px; }
        .gallery-reel::-webkit-scrollbar-thumb:hover { background: rgba(96,165,250,0.85); }
        .gallery-reel { scrollbar-width: thin; scrollbar-color: rgba(96,165,250,0.55) rgba(255,255,255,0.08); }
    </style>
</head>

<body class="bg-slate-950 text-white font-sans" x-data="{
    showDonate: false,
    lang: 'ta',

    activePhoto: { url: '/assets/picture-00.webp' },
    activeVideo: { url: 'QwRz5runoVY' },

    photoItems: [
        { url: '/assets/picture-00.webp' },
        { url: '/assets/picture-01.webp' },
        { url: '/assets/picture-02.webp' },
        { url: '/assets/picture-03.webp' },
        { url: '/assets/picture-04.webp' },
        { url: '/assets/picture-05.webp' },
        { url: '/assets/picture-06.webp' },
        { url: '/assets/picture-07.webp' },
        { url: '/assets/picture-08.webp' },
        { url: '/assets/picture-09.webp' },
        { url: '/assets/picture-10.webp' },
        { url: '/assets/picture-11.webp' }
    ],
    videoItems: [     
        { url: 'pU6eEHzCSjE' },
        { url: 'QwRz5runoVY' },
        { url: 'QpQJJkkYC5Y' },
        { url: 's2zwLFiwYPU' },
        { url: 'p641bcXTFN0' }
    ],

    photoIndex: 0,
    videoIndex: 0,
    photoPaused: false,
    videoPaused: false,
    videoLocked: false,

    scrollReelTo(refName, idx) {
        const reel = this.$refs[refName];
        if (!reel) return;
        const child = reel.children[idx];
        if (!child) return;
        reel.scrollTo({ top: child.offsetTop - reel.offsetTop, behavior: 'smooth' });
    },

    initGallery() {
        this.photoIndex = 0;
        this.videoIndex = 0;
        this.activePhoto = this.photoItems[0];
        this.activeVideo = this.videoItems[0];

        // Once the visitor engages a video (clicks into the player), stop rotating.
        window.addEventListener('blur', () => {
            if (document.activeElement && document.activeElement.tagName === 'IFRAME') this.videoLocked = true;
        });

        setInterval(() => {
            if (this.photoPaused || this.photoItems.length < 2) return;
            this.photoIndex = (this.photoIndex + 1) % this.photoItems.length;
            this.activePhoto = this.photoItems[this.photoIndex];
            this.scrollReelTo('photoReel', this.photoIndex);
        }, 3500);

        setInterval(() => {
            if (this.videoPaused || this.videoLocked || this.videoItems.length < 2) return;
            this.videoIndex = (this.videoIndex + 1) % this.videoItems.length;
            this.activeVideo = this.videoItems[this.videoIndex];
            this.scrollReelTo('videoReel', this.videoIndex);
        }, 6000);
    }
}" x-init="initGallery()">

<!--#include virtual="/parts/nav-ta.html" -->

<!-- Page Header -->
<section class="hero-gradient py-14 px-6 text-center">
    <div class="max-w-3xl mx-auto">
        <p class="text-blue-200 text-sm font-semibold uppercase tracking-widest mb-3">IEF சமூகம்</p>
        <h1 class="text-3xl md:text-5xl font-black text-white mb-4">சமூகப் படத் தொகுப்பு</h1>
        <p class="text-slate-200 text-base md:text-lg leading-relaxed">
            தமிழ்நாட்டில் உள்ள எங்கள் பள்ளிகள், மாணவர்கள் மற்றும் சமூக நிகழ்வுகளின் புகைப்படங்கள் மற்றும் காணொளிகள்.
        </p>
    </div>
</section>

<!-- GALLERY — Photos and Videos reels (full archive) -->
<section class="py-16 bg-slate-950 text-white">
    <div class="max-w-6xl mx-auto px-6">

        <!-- ── PHOTOS sub-section ── -->
        <div class="mb-14">
            <div class="flex items-center gap-3 mb-4">
                <svg class="w-6 h-6 text-blue-400 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <h2 class="text-2xl font-bold text-white tracking-wide">புகைப்படங்கள்</h2>            </div>

            <div class="flex gap-4 h-[360px] md:h-[480px]" @mouseenter="photoPaused = true" @mouseleave="photoPaused = false">
                <div class="flex-1 min-w-0 rounded-2xl overflow-hidden bg-black shadow-xl border border-white/10">
                    <img :src="activePhoto.url" class="w-full h-full object-cover transition-all duration-500" alt="IEF சமூகப் படம்">
                </div>
                <div x-ref="photoReel"
                     class="gallery-reel w-[120px] md:w-[150px] flex-none flex flex-col overflow-y-auto gap-2 pr-1 snap-y snap-mandatory cursor-grab active:cursor-grabbing">
                    <template x-for="item in photoItems" :key="item.url">
                        <button type="button" @click="photoIndex = photoItems.indexOf(item); activePhoto = item"
                                class="flex-none w-full aspect-video rounded-xl overflow-hidden border-2 transition-all snap-start focus:outline-none focus:ring-2 focus:ring-blue-500"
                                :class="activePhoto.url === item.url ? 'border-blue-500 scale-95' : 'border-transparent opacity-60 hover:opacity-100'">
                            <img :src="item.url" class="w-full h-full object-cover" alt="IEF சமூகப் படம்" loading="lazy">
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- ── VIDEOS sub-section ── -->
        <div>
            <div class="flex items-center gap-3 mb-4">
                <svg class="w-6 h-6 text-blue-400 flex-none" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/>
                </svg>
                <h2 class="text-2xl font-bold text-white tracking-wide">காணொளிகள்</h2>            </div>

            <div class="flex gap-4 h-[360px] md:h-[480px]" @mouseenter="videoPaused = true" @mouseleave="videoPaused = false">
                <div class="flex-1 min-w-0 rounded-2xl overflow-hidden bg-black shadow-xl border border-white/10">
                    <iframe class="w-full h-full"
                        :src="'https://www.youtube-nocookie.com/embed/' + activeVideo.url + '?rel=0&modestbranding=1'"
                        title="IEF காணொளி"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div x-ref="videoReel" class="gallery-reel w-[120px] md:w-[150px] flex-none flex flex-col overflow-y-auto gap-2 pr-1 snap-y snap-mandatory cursor-grab active:cursor-grabbing">
                    <template x-for="item in videoItems" :key="item.url">
                        <button type="button" @click="videoIndex = videoItems.indexOf(item); activeVideo = item; videoLocked = true"
                                class="flex-none w-full aspect-video rounded-xl overflow-hidden border-2 transition-all snap-start focus:outline-none focus:ring-2 focus:ring-blue-500 relative"
                                :class="activeVideo.url === item.url ? 'border-blue-500 scale-95' : 'border-transparent opacity-60 hover:opacity-100'">
                            <img :src="'https://img.youtube.com/vi/' + item.url + '/mqdefault.jpg'"
                                 class="w-full h-full object-cover" alt="IEF காணொளி" loading="lazy">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/20">
                                <svg class="w-7 h-7 text-white drop-shadow" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/>
                                </svg>
                            </div>
                        </button>
                    </template>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- Back to Home -->
<section class="py-10 px-6 text-center bg-slate-950">
    <a href="/ta/index.html" class="inline-flex items-center gap-2 text-sm font-bold text-blue-400 hover:text-blue-300 transition border border-blue-400/40 hover:border-blue-300/60 px-5 py-2.5 rounded-full">
        <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
        முகப்புக்குத் திரும்பு
    </a>
</section>

<!--#include virtual="/parts/donate-modal.html" -->
<!--#include virtual="/parts/footer-ta.html" -->

</body>
</html>
