services:
  # Tailscale sidecar to put the website on your tailnet
  ts-ief:
    image: tailscale/tailscale:latest
    container_name: ts-ief
    hostname: ief-dev
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  # Nginx server sharing the Tailscale network namespace
  ief-web-dev:
    image: nginx:latest
    container_name: ief-web-dev
    network_mode: service:ts-ief
    volumes:
      # SSD: Core website files (HTML/CSS/JS)
      - ./html:/usr/share/nginx/html:rw
      # HDD: Large media files mapped into the assets folder
      - /mnt/data/web/ief-media:/usr/share/nginx/html/assets:ro
      # Nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ts-ief
    restart: unless-stopped
